name: Check for updates
on:
  schedule: # for scheduling to work this file must be in the default branch
  - cron: "00 1 * * 5" # Open a PR
  workflow_dispatch: # can be manually dispatched under GitHub's "Actions" tab

jobs:
  flatpak-external-data-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Check for branch update
        run: |
          CURRENT_SHA=$(yq -r '.modules[-1].sources[].commit' net.rpcs3.RPCS3.yaml)
          LATEST_SHA=$(curl -s https://api.github.com/repos/RPCS3/rpcs3/branches/master | jq -r .commit.sha)
          echo "Current RPCS3 commit: ${CURRENT_SHA}"
          echo "Latest RPCS3 commit: ${LATEST_SHA}"
          if ! grep "${LATEST_SHA}" net.rpcs3.RPCS3.yaml > /dev/null; then
            echo "updated=true" >> "$GITHUB_OUTPUT"
            echo "current_commit=${CURRENT_SHA}" >> "$GITHUB_OUTPUT"
            echo "latest_commit=${LATEST_SHA}" >> "$GITHUB_OUTPUT"

            echo "Updating manifest with new commit hash."
            sed -e "s/commit: .\+/commit: ${LATEST_SHA}/" -i net.rpcs3.RPCS3.yaml
          fi
        id: update

      - name: Create Pull Request
        if: steps.update.outputs.updated == 'true'
        env:
          GIT_AUTHOR_NAME: Flatpak External Data Checker
          GIT_COMMITTER_NAME: Flatpak External Data Checker
          # email sets "github-actions[bot]" as commit author, see https://github.community/t/github-actions-bot-email-address/17204/6
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

          COMMIT_BRANCH: update/rpcs3-${{ steps.update.outputs.latest_commit }}
          COMMIT_TITLE: "rpcs3: Update to commit ${{ steps.update.outputs.latest_commit }}"
          COMMIT_BODY: |
            ## Update RPCS3

            - **Current commit**: https://github.com/RPCS3/rpcs3/commit/${{ steps.update.outputs.current_commit }}
            - **New commit**: https://github.com/RPCS3/rpcs3/commit/${{ steps.update.outputs.latest_commit }}

            **Auto-merge enabled** - this PR will be automatically merged after all checks pass.

            ---
            *Generated by GitHub Actions run #${{ github.run_number }}*
        run: |
          git checkout -b "$COMMIT_BRANCH"
          git commit -am "$COMMIT_BODY"
          git push -u origin "$COMMIT_BRANCH"
          gh pr create --title "$COMMIT_TITLE" --body "$COMMIT_BODY"
          gh pr merge --delete-branch --rebase --auto "$COMMIT_BRANCH"
